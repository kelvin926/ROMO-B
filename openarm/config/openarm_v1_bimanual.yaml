schema_version: 1
robot: openarm_v1_bimanual

# This file documents the hardware snapshot imported from
# OpenArm_Portable_Full_20260721.zip. The openarm_can library does not load
# this YAML automatically.
transport:
  mode: classic_can
  nominal_bitrate: 1000000
  can_fd: false

interfaces:
  left:
    name: can1
    physical_assignment_must_be_confirmed_each_session: true
  right:
    name: can0
    physical_assignment_must_be_confirmed_each_session: true

# Both arms use the same IDs on separate SocketCAN interfaces.
motors:
  joint_1: {type: DM8009, send_id: 1, receive_id: 17}
  joint_2: {type: DM8009, send_id: 2, receive_id: 18}
  joint_3: {type: DM4340, send_id: 3, receive_id: 19}
  joint_4: {type: DM4340, send_id: 4, receive_id: 20}
  joint_5: {type: DM4310, send_id: 5, receive_id: 21}
  joint_6: {type: DM4310, send_id: 6, receive_id: 22}
  joint_7: {type: DM4310, send_id: 7, receive_id: 23}
  gripper: {type: DM4310, send_id: 8, receive_id: 24}

joint_order:
  - joint_1
  - joint_2
  - joint_3
  - joint_4
  - joint_5
  - joint_6
  - joint_7
  - gripper

# OpenArm-v1 exposes native calibrated motor/joint coordinates without a
# runtime sign transform. Its official bimanual URDF mirrors link geometry and
# gives J1/J2 different side-specific limits because the automatic calibration
# establishes different zero positions on the two arms.
operator_coordinates:
  convention: openarm_v1_native_joint
  direction_signs:
    left: [1, 1, 1, 1, 1, 1, 1, 1]
    right: [1, 1, 1, 1, 1, 1, 1, 1]
  hard_limits_deg:
    left:
      joint_1: [-200.0, 80.0]
      joint_2: [-190.0, 10.0]
      joint_3: [-90.0, 90.0]
      joint_4: [0.0, 140.0]
      joint_5: [-90.0, 90.0]
      joint_6: [-45.0, 45.0]
      joint_7: [-90.0, 90.0]
      gripper: [-60.0, 0.0]
    right:
      joint_1: [-80.0, 200.0]
      joint_2: [-10.0, 190.0]
      joint_3: [-90.0, 90.0]
      joint_4: [0.0, 140.0]
      joint_5: [-90.0, 90.0]
      joint_6: [-45.0, 45.0]
      joint_7: [-90.0, 90.0]
      gripper: [-60.0, 0.0]
  source:
    urdf: openarm_description/assets/robot/openarm_v1.0/urdf/arm/openarm_arm.xacro
    expanded_urdf: openarm_description/output.urdf
    calibration: openarm-can-zero-position-calibration

# Importing or building this folder must never transmit a frame by itself.
startup_policy:
  # The browser connect action may bring validated canN links up at the fixed
  # 1 Mbps bitrate through the installed least-privilege helper. This only
  # configures the network link; it does not transmit CAN frames or enable motors.
  configure_interfaces_automatically: true
  enable_motors_automatically: false
  command_on_startup: false
  zero_position_automatically: false

# Conservative interactive-control values used by the browser console. These
# are lower than the nominal gains in control_gains.yaml and match the existing
# verified bimanual command path captured in the portable archive.
operator_control:
  # A 100 Hz command stream keeps adjacent position setpoints close enough for
  # smooth motion while staying well below the capacity of each independent
  # 1 Mbps Classic-CAN bus (8 motors per bus).
  command_rate_hz: 100.0
  refresh_rate_hz: 5.0
  default_target_speed_deg_s: 30.0
  # Global UI ceiling.  Commands are additionally clamped per joint using
  # joint_limits.yaml; the gripper uses the DM4310 protocol limit (30 rad/s).
  maximum_target_speed_deg_s: 1718.873385
  gripper_velocity_limit_rad_s: 30.0
  minimum_trajectory_duration_sec: 0.12
  maximum_gain_scale: 1.5
  arm_kp: [20.0, 20.0, 12.0, 12.0, 5.0, 5.0, 4.0]
  arm_kd: [1.0, 1.0, 0.8, 0.8, 0.3, 0.3, 0.3]
  gripper_kp: 5.0
  gripper_kd: 0.3
  gripper_limit_deg: [-60.0, 0.0]
  # Manual zero-write gate used by the operator console. The official
  # mechanical-limit calibration below runs in its own exclusive process.
  calibration_max_velocity_rad_s: 0.05
  calibration_zero_tolerance_deg: 2.0
  calibration_step_delay_sec: 0.1

references:
  joint_limits: joint_limits.yaml
  control_gains: control_gains.yaml
