name: ROS 2 Humble CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  project:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base-jammy
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install project dependencies
        shell: bash
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3-colcon-common-extensions \
            python3-pip \
            python3-yaml \
            libboost-system-dev \
            ros-humble-diagnostic-updater \
            ros-humble-joint-state-publisher \
            ros-humble-nav2-msgs \
            ros-humble-xacro
          rosdep update
          rosdep install --from-paths robot_ws/src --ignore-src -r -y \
            --skip-keys "ament_python navigation2 nav2_bringup nav2_mppi_controller robot_localization twist_mux lidar_localization_ros2 lidarslam livox_ros_driver2 autoware_adapi_v1_msgs autoware_control_msgs autoware_perception_msgs autoware_internal_planning_msgs autoware_map_msgs autoware_planning_msgs autoware_vehicle_msgs autoware_euclidean_cluster_object_detector autoware_localization_msgs unique_identifier_msgs"
      - name: Validate tracked scripts and YAML
        shell: bash
        run: |
          bash -n scripts/*.sh
          python3 -m compileall -q scripts robot_ws/src
          python3 - <<'PY'
          import pathlib
          import yaml

          roots = (pathlib.Path("config"), pathlib.Path("data/manifests"), pathlib.Path("robot_ws/src"))
          paths = [path for root in roots for path in root.rglob("*.yaml")]
          for path in paths:
              yaml.safe_load(path.read_text(encoding="utf-8"))
          print(f"Validated {len(paths)} tracked YAML files")
          PY
      - name: Build and test project packages
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --base-paths robot_ws/src --build-base robot_ws/build \
            --install-base robot_ws/install --symlink-install \
            --cmake-args -DBUILD_TESTING=ON
          source robot_ws/install/setup.bash
          colcon test --base-paths robot_ws/src --build-base robot_ws/build \
            --install-base robot_ws/install --event-handlers console_direct+
          colcon test-result --test-result-base robot_ws/build --verbose
      - name: Exercise PTY safety state machine
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          source robot_ws/install/setup.bash
          python3 scripts/test_pty_bridge.py
      - name: Launch headless simulation smoke test
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          source robot_ws/install/setup.bash
          ./scripts/run_simulation_smoke.sh
