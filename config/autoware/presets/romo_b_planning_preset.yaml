launch:
  - arg: {name: behavior_path_planner_type, default: behavior_path_planner}

  # Corridor behavior planning. Static and moving UNKNOWN clusters are both
  # enabled; road-network modules that need traffic lights/crosswalks are not.
  - arg: {name: launch_static_obstacle_avoidance, default: "true"}
  - arg: {name: launch_avoidance_by_lane_change_module, default: "false"}
  - arg: {name: launch_dynamic_obstacle_avoidance, default: "true"}
  - arg: {name: launch_sampling_planner_module, default: "false"}
  - arg: {name: launch_lane_change_right_module, default: "false"}
  - arg: {name: launch_lane_change_left_module, default: "false"}
  - arg: {name: launch_external_request_lane_change_right_module, default: "false"}
  - arg: {name: launch_external_request_lane_change_left_module, default: "false"}
  - arg: {name: launch_goal_planner_module, default: "true"}
  - arg: {name: launch_start_planner_module, default: "true"}
  - arg: {name: launch_side_shift_module, default: "false"}
  - arg: {name: launch_bidirectional_traffic_module, default: "true"}

  - arg: {name: launch_crosswalk_module, default: "false"}
  - arg: {name: launch_walkway_module, default: "false"}
  - arg: {name: launch_traffic_light_module, default: "false"}
  - arg: {name: launch_intersection_module, default: "false"}
  - arg: {name: launch_roundabout_module, default: "false"}
  - arg: {name: launch_merge_from_private_module, default: "false"}
  - arg: {name: launch_blind_spot_module, default: "false"}
  - arg: {name: launch_detection_area_module, default: "false"}
  - arg: {name: launch_virtual_traffic_light_module, default: "false"}
  - arg: {name: launch_no_stopping_area_module, default: "false"}
  - arg: {name: launch_stop_line_module, default: "false"}
  - arg: {name: launch_occlusion_spot_module, default: "false"}
  - arg: {name: launch_speed_bump_module, default: "false"}
  - arg: {name: launch_no_drivable_lane_module, default: "false"}

  # Path optimizer consumes the drivable-area cuts made by dynamic avoidance.
  - arg: {name: motion_path_smoother_type, default: elastic_band}
  - arg: {name: motion_path_planner_type, default: path_optimizer}

  # Three independent responses: avoid where possible, slow/stop if it is not,
  # and retain downstream trajectory/collision validation.
  - arg: {name: launch_obstacle_stop_module, default: "true"}
  - arg: {name: launch_obstacle_slow_down_module, default: "true"}
  - arg: {name: launch_obstacle_cruise_module, default: "false"}
  - arg: {name: launch_dynamic_obstacle_stop_module, default: "true"}
  - arg: {name: launch_out_of_lane_module, default: "false"}
  - arg: {name: launch_obstacle_velocity_limiter_module, default: "true"}
  - arg: {name: launch_run_out_module, default: "true"}
  - arg: {name: launch_boundary_departure_prevention_module, default: "true"}
  - arg: {name: launch_road_user_stop_module, default: "true"}
  - arg: {name: velocity_smoother_type, default: JerkFiltered}
  - arg: {name: launch_surround_obstacle_checker, default: "true"}

  - arg: {name: launch_parking_module, default: "false"}
  - arg: {name: launch_latency_checker, default: "true"}
  - arg: {name: launch_trajectory_checker, default: "true"}
  - arg: {name: launch_intersection_collision_checker, default: "false"}
  - arg: {name: launch_rear_collision_checker, default: "false"}
  - arg: {name: launch_remaining_distance_time_calculator, default: "true"}
