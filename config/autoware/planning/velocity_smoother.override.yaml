/**:
  ros__parameters:
    # Keep the smoother's own initial maximum at ROMO-B's physical limit.
    # Autoware 1.8.0 can calculate its first profile before an external
    # velocity-limit update is folded into max_velocity_with_deceleration_.
    # The map limit alone can then overshoot to about 0.224 m/s while meeting
    # jerk constraints.  This independent hard planning cap prevents that
    # startup transient; the physical follower still enforces its own cap.
    max_vel: 0.20
    min_curve_velocity: 0.05
    replan_vel_deviation: 0.10
    engage_velocity: 0.10
    engage_acceleration: 0.10
    stopping_velocity: 0.10
