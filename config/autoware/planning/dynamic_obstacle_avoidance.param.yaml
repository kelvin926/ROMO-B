/**:
  ros__parameters:
    dynamic_avoidance:
      common:
        enable_debug_info: true
        use_hatched_road_markings: false
      target_object:
        car: true
        truck: true
        bus: true
        trailer: true
        # Euclidean LiDAR clusters intentionally remain UNKNOWN. This makes a
        # person, cart, box, or other unclassified return an avoidance target.
        unknown: true
        bicycle: true
        motorcycle: true
        pedestrian: true
        max_obstacle_vel: 5.0
        min_obstacle_vel: 0.0
        successive_num_to_entry_dynamic_avoidance_condition: 3
        successive_num_to_exit_dynamic_avoidance_condition: 2
        min_obj_lat_offset_to_ego_path: 0.0
        max_obj_lat_offset_to_ego_path: 1.5
        cut_in_object:
          min_time_to_start_cut_in: 0.5
          min_lon_offset_ego_to_object: 0.0
          min_object_vel: 0.1
        cut_out_object:
          max_time_from_outside_ego_path: 1.0
          min_object_lat_vel: 0.1
          min_object_vel: 0.1
        crossing_object:
          min_overtaking_object_vel: 0.05
          max_overtaking_object_angle: 1.05
          min_oncoming_object_vel: 0.05
          max_oncoming_object_angle: 0.523
          max_pedestrian_crossing_vel: 2.0
        front_object:
          max_object_angle: 0.785
          min_object_vel: -0.2
          max_ego_path_lat_cover_ratio: 0.8
        stopped_object:
          max_object_vel: 0.12
      drivable_area_generation:
        expand_drivable_area: false
        polygon_generation_method: ego_path_base
        object_path_base:
          min_longitudinal_polygon_margin: 0.5
        lat_offset_from_obstacle: 0.35
        margin_distance_around_pedestrian: 0.45
        predicted_path:
          end_time_to_consider: 3.0
          threshold_confidence: 0.0
        max_lat_offset_to_avoid: 0.50
        max_time_for_object_lat_shift: 0.0
        lpf_gain_for_lat_avoid_to_offset: 0.7
        max_ego_lat_acc: 0.20
        max_ego_lat_jerk: 0.20
        delay_time_ego_shift: 0.2
        overtaking_object:
          max_time_to_collision: 40.0
          start_duration_to_avoid: 1.0
          end_duration_to_avoid: 1.0
          duration_to_hold_avoidance: 1.0
        oncoming_object:
          max_time_to_collision: 40.0
          start_duration_to_avoid: 1.0
          end_duration_to_avoid: 0.0
