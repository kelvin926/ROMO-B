/**:
  ros__parameters:
    # Deterministic low-speed model for Autoware's planning simulator.  This
    # matches the forward-only limits enforced again by the physical bridge;
    # it is never used to command the real PCU.
    simulated_frame_id: base_link
    origin_frame_id: map
    vehicle_model_type: IDEAL_STEER_VEL
    initialize_source: INITIAL_POSE_TOPIC
    timer_sampling_time_ms: 25
    add_measurement_noise: false
    vel_lim: 0.20
    vel_rate_lim: 0.30
    steer_lim: 0.3839724354  # 22 degrees
    steer_rate_lim: 0.50
    acc_time_delay: 0.0
    acc_time_constant: 0.10
    steer_time_delay: 0.0
    steer_time_constant: 0.10
    steer_dead_band: 0.0
    x_stddev: 0.0001
    y_stddev: 0.0001
    enable_road_slope_simulation: false
