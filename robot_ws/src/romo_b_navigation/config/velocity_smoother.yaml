velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: OPEN_LOOP
    max_velocity: [1.00, 0.0, 1.25]
    min_velocity: [0.0, 0.0, -1.25]
    max_accel: [0.30, 0.0, 1.00]
    max_decel: [-1.00, 0.0, -1.50]
    odom_topic: /odometry/filtered
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 0.15
