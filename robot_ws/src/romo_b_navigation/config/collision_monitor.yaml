collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: base_footprint
    odom_frame_id: odom
    cmd_vel_in_topic: /cmd_vel_smoothed
    cmd_vel_out_topic: /cmd_vel_collision_checked
    state_topic: /romo_b/collision_monitor_state
    transform_tolerance: 0.2
    # Mid-360 publishes at 10 Hz.  The measured end-to-end age under the full
    # Autoware field load is 0.20-0.38 s, so 0.20 s rejected every live cloud.
    # A stale source still fails closed: the monitor stops publishing and the
    # command heartbeat holds the platform at zero without latching Hi_E-ST.
    source_timeout: 0.50
    # Fixed-frame odom lookup caused extrapolation failures with live stamps.
    base_shift_correction: false
    stop_pub_timeout: 0.20
    polygons: [StopZone, SlowdownZone]
    StopZone:
      type: polygon
      # Last-resort collision pause only; never disarms or asserts E-stop.
      # A higher point threshold rejects sparse Mid-360 noise.
      points: [0.38, 0.45, 0.70, 0.45, 0.70, -0.45, 0.38, -0.45]
      action_type: stop
      max_points: 20
      visualize: true
      polygon_pub_topic: /romo_b/stop_zone
      enabled: true
    SlowdownZone:
      type: polygon
      points: [0.30, 0.65, 1.25, 0.65, 1.25, -0.65, 0.30, -0.65]
      action_type: slowdown
      slowdown_ratio: 0.55
      max_points: 10
      visualize: true
      polygon_pub_topic: /romo_b/slowdown_zone
      enabled: true
    observation_sources: [pointcloud]
    pointcloud:
      type: pointcloud
      topic: /sensing/lidar/top/pointcloud_filtered
      min_height: 0.15
      max_height: 1.80
      enabled: true
