map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 2.0
    planner_plugins: [GridBased]
    GridBased:
      plugin: nav2_smac_planner/SmacPlannerHybrid
      tolerance: 0.25
      downsample_costmap: false
      allow_unknown: true
      max_iterations: 100000
      max_on_approach_iterations: 1000
      terminal_checking_interval: 5000
      motion_model_for_search: DUBIN
      angle_quantization_bins: 72
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      minimum_turning_radius: 0.80
      reverse_penalty: 1000.0
      change_penalty: 0.0
      non_straight_penalty: 1.20
      cost_penalty: 2.0
      retrospective_penalty: 0.015
      lookup_table_size: 20.0
      cache_obstacle_heuristic: true
      smooth_path: true

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: progress_checker
    goal_checker_plugins: [goal_checker]
    controller_plugins: [FollowPath]
    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.10
      movement_time_allowance: 15.0
    goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      stateful: true
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.20
    FollowPath:
      plugin: nav2_mppi_controller::MPPIController
      time_steps: 30
      model_dt: 0.05
      batch_size: 1200
      vx_std: 0.08
      vy_std: 0.0
      wz_std: 0.10
      vx_max: 0.20
      vx_min: 0.0
      vy_max: 0.0
      wz_max: 0.25
      iteration_count: 1
      prune_distance: 1.5
      transform_tolerance: 0.2
      temperature: 0.3
      gamma: 0.015
      motion_model: Ackermann
      visualize: false
      regenerate_noises: false
      AckermannConstraints:
        min_turning_r: 0.80
      critics:
        - ConstraintCritic
        - CostCritic
        - GoalCritic
        - GoalAngleCritic
        - PathAlignCritic
        - PathFollowCritic
        - PathAngleCritic
        - PreferForwardCritic
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 0.5
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.0
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 10
        use_path_orientations: true
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.0
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 0.8
        mode: 0
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 20.0
        threshold_to_consider: 0.5

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      footprint: "[[0.398,0.319],[0.398,-0.319],[-0.398,-0.319],[-0.398,0.319]]"
      transform_tolerance: 0.2
      plugins: [voxel_layer, inflation_layer]
      voxel_layer:
        plugin: nav2_costmap_2d::VoxelLayer
        enabled: true
        publish_voxel_map: false
        origin_z: 0.0
        z_resolution: 0.10
        z_voxels: 18
        max_obstacle_height: 1.80
        mark_threshold: 0
        observation_sources: pointcloud
        pointcloud:
          topic: /sensing/lidar/top/pointcloud_filtered
          min_obstacle_height: 0.10
          max_obstacle_height: 1.80
          clearing: true
          marking: true
          data_type: PointCloud2
          obstacle_min_range: 0.15
          obstacle_max_range: 12.0
          raytrace_min_range: 0.15
          raytrace_max_range: 15.0
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 5.0
        inflation_radius: 0.35
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05
      track_unknown_space: true
      footprint: "[[0.398,0.319],[0.398,-0.319],[-0.398,-0.319],[-0.398,0.319]]"
      transform_tolerance: 0.2
      plugins: [static_layer, obstacle_layer, inflation_layer]
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: pointcloud
        pointcloud:
          topic: /sensing/lidar/top/pointcloud_filtered
          min_obstacle_height: 0.10
          max_obstacle_height: 1.80
          clearing: true
          marking: true
          data_type: PointCloud2
          obstacle_min_range: 0.15
          obstacle_max_range: 12.0
          raytrace_min_range: 0.15
          raytrace_max_range: 15.0
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 5.0
        inflation_radius: 0.35
      always_send_full_costmap: true
