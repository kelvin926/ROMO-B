map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 2.0
    planner_plugins: [GridBased]
    GridBased:
      plugin: nav2_smac_planner/SmacPlannerHybrid
      tolerance: 0.25
      downsample_costmap: false
      allow_unknown: false
      max_iterations: 100000
      max_on_approach_iterations: 1000
      terminal_checking_interval: 5000
      motion_model_for_search: DUBIN
      angle_quantization_bins: 72
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      minimum_turning_radius: 0.80
      reverse_penalty: 1000.0
      change_penalty: 0.0
      non_straight_penalty: 1.20
      cost_penalty: 2.0
      retrospective_penalty: 0.015
      lookup_table_size: 20.0
      cache_obstacle_heuristic: true
      smooth_path: true

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    # Keep the goal alive while a moving obstacle crosses and the global path
    # is being rebuilt. The BT also retries without disarming.
    failure_tolerance: 10.0
    progress_checker_plugin: progress_checker
    goal_checker_plugins: [goal_checker]
    controller_plugins: [FollowPath]
    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.05
      movement_time_allowance: 120.0
    goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      stateful: true
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.20
    FollowPath:
      # Pivot only when path/goal heading error is large, then hand control
      # back to the proven Ackermann MPPI obstacle-avoidance controller.
      plugin: nav2_rotation_shim_controller::RotationShimController
      angular_dist_threshold: 0.70
      angular_disengage_threshold: 0.35
      forward_sampling_distance: 0.50
      rotate_to_heading_angular_vel: 0.45
      max_angular_accel: 0.80
      simulate_ahead_time: 0.80
      rotate_to_goal_heading: true
      closed_loop: true
      # Humble configures the wrapped controller in this same FollowPath
      # namespace, so this is a plugin-class string rather than a nested map.
      primary_controller: nav2_mppi_controller::MPPIController
      # MPPI generates locally collision-free Ackermann trajectories instead
      # of merely stopping on the blocked global path like pure pursuit.
      time_steps: 40
      model_dt: 0.10
      batch_size: 1500
      vx_std: 0.15
      vy_std: 0.0
      wz_std: 0.35
      vx_max: 0.50
      vx_min: 0.0
      vy_max: 0.0
      wz_max: 0.65
      iteration_count: 1
      prune_distance: 2.5
      transform_tolerance: 0.20
      temperature: 0.25
      gamma: 0.015
      motion_model: Ackermann
      visualize: false
      retry_attempt_limit: 3
      reset_period: 0.5
      regenerate_noises: false
      AckermannConstraints:
        min_turning_r: 0.80
      critics:
        - ConstraintCritic
        - CostCritic
        - GoalCritic
        - PathAlignCritic
        - PathFollowCritic
        - PathAngleCritic
        - PreferForwardCritic
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        critical_cost: 250.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 0.4
        inflation_layer_name: inflation_layer
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
        threshold_to_consider: 1.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        # Low enough to permit a lateral detour around people. This critic is
        # disabled as soon as 3% of the local reference path is occupied.
        cost_weight: 4.0
        max_path_occupancy_ratio: 0.03
        trajectory_point_step: 4
        threshold_to_consider: 0.4
        offset_from_furthest: 12
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
        offset_from_furthest: 8
        threshold_to_consider: 1.5
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.4
        max_angle_to_furthest: 1.0
        forward_preference: true
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
        threshold_to_consider: 0.3

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    navigators: [navigate_to_pose, navigate_through_poses]
    navigate_to_pose:
      plugin: nav2_bt_navigator/NavigateToPoseNavigator
    navigate_through_poses:
      plugin: nav2_bt_navigator/NavigateThroughPosesNavigator

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: [wait]
    wait:
      plugin: nav2_behaviors/Wait
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.2

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      footprint: "[[0.398,0.319],[0.398,-0.319],[-0.398,-0.319],[-0.398,0.319]]"
      transform_tolerance: 0.5
      plugins: [transient_obstacle_layer, denoise_layer, inflation_layer]
      transient_obstacle_layer:
        plugin: romo_b_navigation::TransientObstacleLayer
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: pointcloud
        pointcloud:
          topic: /sensing/lidar/top/pointcloud_filtered
          min_obstacle_height: 0.15
          max_obstacle_height: 1.80
          clearing: true
          marking: true
          data_type: PointCloud2
          obstacle_min_range: 0.15
          obstacle_max_range: 8.0
          raytrace_min_range: 0.15
          raytrace_max_range: 10.0
          observation_persistence: 0.35
          expected_update_rate: 0.20
        combination_method: 1
      denoise_layer:
        plugin: nav2_costmap_2d::DenoiseLayer
        enabled: true
        minimal_group_size: 3
        group_connectivity_type: 8
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 5.0
        # MPPI needs a short non-lethal gradient outside the 0.319 m
        # inscribed radius to bend around an obstacle before collision.
        inflation_radius: 0.38
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      # The global route represents static walls and furniture only. Moving
      # people belong to the local MPPI costmap; otherwise a person can make
      # ComputePath fail and cancel local avoidance before it can steer around.
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05
      track_unknown_space: true
      footprint: "[[0.398,0.319],[0.398,-0.319],[-0.398,-0.319],[-0.398,0.319]]"
      transform_tolerance: 0.5
      plugins: [static_layer, inflation_layer]
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 5.0
        inflation_radius: 0.38
      always_send_full_costmap: true
