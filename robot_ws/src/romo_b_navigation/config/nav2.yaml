map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 2.0
    planner_plugins: [GridBased]
    GridBased:
      plugin: nav2_smac_planner/SmacPlannerHybrid
      tolerance: 0.25
      downsample_costmap: false
      allow_unknown: false
      max_iterations: 100000
      max_on_approach_iterations: 1000
      terminal_checking_interval: 5000
      motion_model_for_search: DUBIN
      angle_quantization_bins: 72
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      minimum_turning_radius: 0.80
      reverse_penalty: 1000.0
      change_penalty: 0.0
      non_straight_penalty: 1.20
      cost_penalty: 2.0
      retrospective_penalty: 0.015
      lookup_table_size: 20.0
      cache_obstacle_heuristic: true
      smooth_path: true

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    # Keep the goal alive while a moving obstacle crosses and the global path
    # is being rebuilt. The BT also retries without disarming.
    failure_tolerance: 10.0
    progress_checker_plugin: progress_checker
    goal_checker_plugins: [goal_checker]
    controller_plugins: [FollowPath]
    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.05
      movement_time_allowance: 120.0
    goal_checker:
      # Forward-only Ackermann steering cannot satisfy an arbitrary clicked
      # yaw after reaching the point. Completion is position based; the command
      # pipeline then publishes zero continuously.
      plugin: nav2_controller::PositionGoalChecker
      stateful: true
      xy_goal_tolerance: 0.25
    FollowPath:
      plugin: nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController
      desired_linear_vel: 0.50
      lookahead_dist: 0.80
      min_lookahead_dist: 0.60
      max_lookahead_dist: 1.20
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 0.0
      transform_tolerance: 0.20
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.03
      approach_velocity_scaling_dist: 1.0
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.5
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.80
      regulated_linear_scaling_min_speed: 0.05
      cost_scaling_dist: 0.50
      cost_scaling_gain: 1.0
      inflation_cost_scaling_factor: 5.0
      use_rotate_to_heading: false
      allow_reversing: false

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    navigators: [navigate_to_pose, navigate_through_poses]
    navigate_to_pose:
      plugin: nav2_bt_navigator/NavigateToPoseNavigator
    navigate_through_poses:
      plugin: nav2_bt_navigator/NavigateThroughPosesNavigator

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: [wait]
    wait:
      plugin: nav2_behaviors/Wait
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.2

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      footprint: "[[0.398,0.319],[0.398,-0.319],[-0.398,-0.319],[-0.398,0.319]]"
      transform_tolerance: 0.5
      plugins: [transient_obstacle_layer, denoise_layer, inflation_layer]
      transient_obstacle_layer:
        plugin: romo_b_navigation::TransientObstacleLayer
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: pointcloud
        pointcloud:
          topic: /sensing/lidar/top/pointcloud_filtered
          min_obstacle_height: 0.15
          max_obstacle_height: 1.80
          clearing: true
          marking: true
          data_type: PointCloud2
          obstacle_min_range: 0.15
          obstacle_max_range: 8.0
          raytrace_min_range: 0.15
          raytrace_max_range: 10.0
          observation_persistence: 0.35
          expected_update_rate: 0.20
        combination_method: 1
      denoise_layer:
        plugin: nav2_costmap_2d::DenoiseLayer
        enabled: true
        minimal_group_size: 3
        group_connectivity_type: 8
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 5.0
        inflation_radius: 0.25
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 2.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05
      track_unknown_space: true
      footprint: "[[0.398,0.319],[0.398,-0.319],[-0.398,-0.319],[-0.398,0.319]]"
      transform_tolerance: 0.5
      plugins: [static_layer, transient_obstacle_layer, inflation_layer]
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      transient_obstacle_layer:
        plugin: romo_b_navigation::TransientObstacleLayer
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: pointcloud
        pointcloud:
          topic: /sensing/lidar/top/pointcloud_filtered
          min_obstacle_height: 0.15
          max_obstacle_height: 1.80
          clearing: true
          marking: true
          data_type: PointCloud2
          obstacle_min_range: 0.15
          obstacle_max_range: 8.0
          raytrace_min_range: 0.15
          raytrace_max_range: 10.0
          observation_persistence: 0.35
          expected_update_rate: 0.20
        combination_method: 1
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 5.0
        inflation_radius: 0.25
      always_send_full_costmap: true
