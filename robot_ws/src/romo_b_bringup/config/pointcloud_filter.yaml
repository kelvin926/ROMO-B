romo_b_pointcloud_filter:
  ros__parameters:
    input_topic: /sensing/lidar/top/pointcloud_raw
    output_topic: /sensing/lidar/top/pointcloud_filtered
    target_frame: base_footprint
    voxel_size: 0.05
    enable_height_filter: true
    min_z: 0.10
    max_z: 1.80
    # Remove the complete robot/mount prism. Mid-360 returns from the mount
    # were measured at z=0.47-0.57 m and made the robot's own start cell lethal.
    self_half_x: 0.42
    self_half_y: 0.34
    self_min_z: 0.0
    self_max_z: 1.80
    transform_timeout_sec: 0.05
