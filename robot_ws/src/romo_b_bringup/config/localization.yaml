/**:
  ros__parameters:
    registration_method: NDT_OMP
    score_threshold: 6.0
    ndt_resolution: 0.5
    ndt_step_size: 0.1
    ndt_num_threads: 4
    ndt_max_iterations: 35
    transform_epsilon: 0.01
    voxel_leaf_size: 0.15
    enable_scan_voxel_filter: true
    scan_max_range: 30.0
    scan_min_range: 0.5
    scan_period: 0.1
    use_pcd_map: true
    map_path: ""
    set_initial_pose: false
    use_odom: true
    use_twist_prediction: false
    use_imu: false
    use_imu_preintegration: false
    predict_pose_from_previous_delta: true
    reject_above_score_threshold: true
    enable_map_odom_tf: true
    global_frame_id: map
    odom_frame_id: odom
    base_frame_id: base_link
    # Re-stamp and republish map->odom between 10 Hz LiDAR updates.  Without
    # this, Nav2 frequently asked for a transform a few milliseconds newer than
    # the most recent localization result and stopped with extrapolation errors.
    enable_timer_publishing: true
    pose_publish_frequency: 20.0
